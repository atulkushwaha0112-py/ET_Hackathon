<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Register – NewsDesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--card:#111118;--border:#1f1f2e;--accent:#f97316;--text:#f0eff0;--muted:#6b7280}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
background-image:radial-gradient(ellipse at 80% 50%,rgba(249,115,22,.08) 0,transparent 55%)}
.wrap{width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:2rem}
.brand h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-.03em}
.brand h1 span{color:var(--accent)}
.brand p{color:var(--muted);font-size:.875rem;margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem}
.card h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:.3rem}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.hint{font-size:.72rem;color:var(--muted);margin-top:.3rem}
.status{font-size:.75rem;margin-top:.3rem;min-height:1rem}
.status.ok{color:#86efac}.status.err{color:#fca5a5}
.btn{width:100%;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;border:none;border-radius:8px;padding:.8rem;cursor:pointer;margin-top:1.2rem;transition:opacity .2s}
.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:not-allowed}
.foot{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--muted)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.alert.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><h1>News<span>Desk</span></h1><p>Your personalised financial news hub</p></div>
  <div class="card">
    <h2>Create account</h2>
    <p class="sub">Set up your personalised news experience</p>
    <div class="alert err" id="err"></div>
    <div class="alert ok"  id="ok"></div>
    <div class="field"><label>Full Name <span style="color:var(--muted);text-transform:none">(optional)</span></label><input id="name" placeholder="Atul Kushwaha"/></div>
    <div class="field">
      <label>Username</label>
      <input id="username" placeholder="atul_k" autocomplete="username" oninput="checkUser(this.value)"/>
      <div class="status" id="uStatus"></div>
      <div class="hint">Letters, numbers, _ and - only. Min 3 chars.</div>
    </div>
    <div class="field"><label>Email</label><input id="email" type="email" placeholder="atul@email.com"/></div>
    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="Min 6 characters" oninput="checkPass(this.value)"/>
      <div class="status" id="pStatus"></div>
    </div>
    <button class="btn" id="btn" onclick="doRegister()">Create Account</button>
    <div class="foot">Have an account? <a href="/auth/login">Sign in</a></div>
  </div>
</div>
<script>
function checkUser(v){
  const el=document.getElementById('uStatus');
  v=v.trim();
  if(!v){el.textContent='';return}
  if(v.length<3){el.textContent='Too short';el.className='status err';return}
  if(!/^[a-zA-Z0-9_-]+$/.test(v)){el.textContent='Invalid characters';el.className='status err';return}
  el.textContent='✓ Looks good';el.className='status ok';
}
function checkPass(v){
  const el=document.getElementById('pStatus');
  if(!v){el.textContent='';return}
  if(v.length<6){el.textContent='Too short (min 6)';el.className='status err';}
  else{el.textContent='✓ Strong enough';el.className='status ok';}
}
async function doRegister(){
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.style.display='none';ok.style.display='none';
  const name=document.getElementById('name').value.trim();
  const username=document.getElementById('username').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!email||!password){err.textContent='Username, email and password are required.';err.style.display='block';return}
  btn.disabled=true;btn.textContent='Creating account…';
  try{
    const r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password,name})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.detail||'Registration failed.';err.style.display='block';return}
    localStorage.setItem('access_token',d.access_token);
    localStorage.setItem('username',d.username);
    ok.textContent='Account created! Setting up preferences…';ok.style.display='block';
    setTimeout(()=>window.location.href='/preferences/setup',900);
  }catch(e){err.textContent='Network error.';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Create Account'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
</script>
</body>
</html>
