<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NewsDesk — Create AI Account | Economic Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --et-primary: #0A2A38;
  --et-deep: #051E28;
  --et-gold: #E5B83C;
  --et-gold-glow: rgba(229, 184, 60, 0.5);
  --et-teal: #2F9B7A;
  --et-cream: #FFFBF0;
  --et-paper: #FEF7E8;
  --et-mid: #8B7A6B;
  --et-dark: #1F2E2A;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(circle at 30% 40%, #FFFBF0, #FCF3E0);
  min-height: 100vh;
  overflow: hidden;
  color: var(--et-dark);
}

#canvas-container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* Navigation */
.top-nav {
  position: fixed;
  top: 24px;
  left: 28px;
  right: 28px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(255, 251, 240, 0.88);
  backdrop-filter: blur(24px);
  border-radius: 80px;
  border: 1px solid rgba(229, 184, 60, 0.4);
  z-index: 100;
  animation: slideDown 0.6s ease-out;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 16px;
}

.newsdesk-logo {
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  color: var(--et-gold);
  font-weight: 800;
  font-size: 1rem;
  padding: 8px 22px;
  border-radius: 50px;
  border: 1px solid var(--et-gold);
}

.brand-text {
  font-weight: 800;
  font-size: 1.2rem;
  background: linear-gradient(135deg, var(--et-primary), var(--et-teal));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.right-stats {
  display: flex;
  gap: 16px;
  align-items: center;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(47, 155, 122, 0.12);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--et-teal);
}

.live-dot {
  width: 8px;
  height: 8px;
  background: #2F9B7A;
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}

.market-chip {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 40px;
  background: white;
  border: 1px solid rgba(229, 184, 60, 0.3);
}

.market-chip.up { color: var(--et-teal); }

#liveClock {
  font-family: monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--et-mid);
  background: rgba(0, 0, 0, 0.02);
  padding: 6px 14px;
  border-radius: 28px;
}

/* Registration Card */
.register-wrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 200;
  width: 500px;
  animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1.2) forwards;
}

@keyframes floatUp {
  from { opacity: 0; transform: translate(-50%, -35%) scale(0.96); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.register-card {
  background: rgba(255, 251, 240, 0.95);
  backdrop-filter: blur(32px);
  border-radius: 56px;
  border: 1px solid rgba(229, 184, 60, 0.5);
  box-shadow: 0 40px 80px rgba(10, 42, 56, 0.12), 0 0 0 1px rgba(229, 184, 60, 0.2) inset;
  padding: 40px 40px 44px;
  transition: all 0.3s ease;
}

.register-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 48px 96px rgba(229, 184, 60, 0.18);
}

.card-accent {
  width: 70px;
  height: 4px;
  background: linear-gradient(90deg, var(--et-gold), var(--et-teal));
  border-radius: 4px;
  margin-bottom: 24px;
  animation: gradientShift 3s infinite;
  background-size: 200% auto;
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% center; }
  50% { background-position: 100% center; }
}

.welcome-title {
  font-size: 1.9rem;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 8px;
  color: var(--et-primary);
}

.welcome-title span {
  background: linear-gradient(135deg, var(--et-gold), var(--et-teal));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.card-sub {
  font-size: 0.85rem;
  color: var(--et-mid);
  margin-bottom: 28px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
}

.ai-chip {
  background: linear-gradient(135deg, var(--et-gold), #B8860B);
  padding: 3px 12px;
  border-radius: 30px;
  font-size: 0.6rem;
  font-weight: 800;
  color: var(--et-primary);
}

/* Input Fields */
.input-field {
  margin-bottom: 18px;
  position: relative;
}

.input-field input {
  width: 100%;
  background: #FFFFFF;
  border: 2px solid rgba(229, 184, 60, 0.2);
  border-radius: 48px;
  padding: 16px 22px 8px 22px;
  font-size: 0.95rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  outline: none;
  transition: all 0.25s;
  color: var(--et-dark);
}

.input-field label {
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
  color: var(--et-mid);
  pointer-events: none;
  transition: all 0.2s;
  font-weight: 500;
}

.input-field input:focus {
  border-color: var(--et-gold);
  box-shadow: 0 0 0 5px rgba(229, 184, 60, 0.12);
}

.input-field input:focus ~ label,
.input-field input:not(:placeholder-shown) ~ label {
  top: 10px;
  font-size: 0.6rem;
  color: var(--et-gold);
  font-weight: 700;
}

.input-field input::placeholder {
  color: transparent;
}

.hint {
  font-size: 0.65rem;
  color: var(--et-mid);
  margin-top: 6px;
  margin-left: 22px;
}

.status {
  font-size: 0.7rem;
  margin-top: 5px;
  margin-left: 22px;
  min-height: 20px;
}

.status.ok { color: var(--et-teal); }
.status.err { color: #E67E22; }

/* Alerts */
.alert {
  padding: 12px 18px;
  border-radius: 28px;
  font-size: 0.75rem;
  font-weight: 600;
  margin-bottom: 18px;
  display: none;
}

.alert.err {
  background: rgba(230, 126, 34, 0.12);
  border-left: 4px solid #E67E22;
  color: #B85C1A;
}

.alert.ok {
  background: rgba(47, 155, 122, 0.12);
  border-left: 4px solid var(--et-teal);
  color: #1E6B55;
}

/* Register Button */
.register-btn {
  width: 100%;
  background: linear-gradient(105deg, var(--et-primary), var(--et-teal));
  background-size: 200% auto;
  border: none;
  border-radius: 52px;
  padding: 16px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  color: white;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 10px 28px rgba(10, 42, 56, 0.35);
  margin-top: 12px;
}

.register-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 35px rgba(229, 184, 60, 0.4);
}

.btn-ripple {
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.35) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.register-btn:hover .btn-ripple {
  transform: translateX(100%);
}

.footer-links {
  display: flex;
  justify-content: center;
  margin-top: 24px;
  font-size: 0.8rem;
  font-weight: 600;
  gap: 24px;
}

.footer-links a {
  color: var(--et-teal);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-links a:hover {
  color: var(--et-gold);
}

.secure-badge {
  display: flex;
  justify-content: center;
  margin-top: 18px;
  gap: 8px;
  font-size: 0.65rem;
  color: var(--et-mid);
}

/* Music Control */
.music-control {
  position: fixed;
  bottom: 100px;
  right: 28px;
  z-index: 150;
  background: rgba(10, 42, 56, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 50px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid rgba(229, 184, 60, 0.4);
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--et-gold);
}

.music-control:hover {
  transform: scale(1.05);
}

/* Bottom Ticker */
.ticker-bar {
  position: fixed;
  bottom: 24px;
  left: 28px;
  right: 28px;
  background: rgba(10, 42, 56, 0.88);
  backdrop-filter: blur(24px);
  border-radius: 64px;
  height: 54px;
  display: flex;
  align-items: center;
  z-index: 100;
  border: 1px solid rgba(229, 184, 60, 0.5);
}

.ticker-label {
  background: linear-gradient(115deg, var(--et-gold), #B8860B);
  color: var(--et-primary);
  padding: 0 32px;
  height: 100%;
  display: flex;
  align-items: center;
  border-radius: 64px 0 0 64px;
  font-weight: 800;
  font-size: 0.7rem;
}

.ticker-scroll {
  flex: 1;
  overflow: hidden;
}

.ticker-items {
  display: flex;
  white-space: nowrap;
  animation: scrollTicker 28s linear infinite;
}

.ticker-item {
  display: inline-flex;
  gap: 16px;
  padding: 0 32px;
  border-right: 1px solid rgba(229, 184, 60, 0.4);
  font-size: 0.75rem;
  font-weight: 600;
  color: #FEF7E8;
}

@keyframes scrollTicker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
</style>
</head>
<body>
<div id="canvas-container"></div>

<div class="top-nav">
  <div class="logo-area">
    <div class="newsdesk-logo">NewsDesk</div>
    <div class="brand-text">AI Neural Intelligence <span style="background:rgba(229,184,60,0.2); padding:4px 12px; border-radius:40px; font-size:0.65rem;">REGISTER</span></div>
  </div>
  <div class="right-stats">
    <div class="live-badge"><div class="live-dot"></div> AI LIVE</div>
    <div class="market-chip up">NIFTY ▲ 0.52%</div>
    <div id="liveClock">--:-- IST</div>
  </div>
</div>

<div class="register-wrapper">
  <div class="register-card">
    <div class="card-accent"></div>
    <div class="welcome-title">Join <span>NewsDesk</span><br>AI Intelligence</div>
    <div class="card-sub"><span>🤖 Create your cognitive account</span> <span class="ai-chip">GPT-6 Ready</span></div>
    
    <div id="errorAlert" class="alert err"></div>
    <div id="successAlert" class="alert ok"></div>
    
    <div class="input-field">
      <input type="text" id="name" placeholder=" ">
      <label>Full Name <span style="opacity:0.6">(optional)</span></label>
    </div>
    
    <div class="input-field">
      <input type="text" id="username" placeholder=" " autocomplete="username" oninput="checkUsername(this.value)">
      <label>Username</label>
      <div id="uStatus" class="status"></div>
      <div class="hint">Letters, numbers, _ and - only. Min 3 chars.</div>
    </div>
    
    <div class="input-field">
      <input type="email" id="email" placeholder=" ">
      <label>Email Address</label>
    </div>
    
    <div class="input-field">
      <input type="password" id="password" placeholder=" " oninput="checkPassword(this.value)">
      <label>Password</label>
      <div id="pStatus" class="status"></div>
      <div class="hint">Minimum 6 characters</div>
    </div>
    
    <button class="register-btn" id="registerBtn">
      <span class="btn-ripple"></span>
      <span id="btnText">✨ Create AI Account →</span>
    </button>
    
    <div class="footer-links">
      <!-- <a href="l1.html">Sign</a> -->
      <!-- <a href="/auth/forgot">Forgot Password?</a> -->
    </div>
    <div class="secure-badge">🔒 Neural Encrypted • AI-Powered</div>
  </div>
</div>

<div class="ticker-bar">
  <div class="ticker-label">🧠 NEURAL STREAM</div>
  <div class="ticker-scroll"><div class="ticker-items" id="tickerItems"></div></div>
</div>

<div class="music-control" id="musicControl">
  <span>🎵</span>
  <span id="musicStatus">Ambient Neural</span>
  <span id="musicToggle">🔊</span>
</div>

<script>
// ========== AMBIENT MUSIC ==========
let audioContext = null;
let isMusicPlaying = false;
let musicGain = null;

function createAmbientMusic() {
  if (audioContext) return;
  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioContext.createGain();
  musicGain.gain.value = 0.3;
  musicGain.connect(audioContext.destination);
  
  const osc1 = audioContext.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 55.0;
  const gain1 = audioContext.createGain();
  gain1.gain.value = 0.22;
  osc1.connect(gain1);
  gain1.connect(musicGain);
  osc1.start();
  
  const osc2 = audioContext.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 82.5;
  const gain2 = audioContext.createGain();
  gain2.gain.value = 0.18;
  osc2.connect(gain2);
  gain2.connect(musicGain);
  osc2.start();
  
  const osc3 = audioContext.createOscillator();
  osc3.type = 'triangle';
  osc3.frequency.value = 164.8;
  const gain3 = audioContext.createGain();
  gain3.gain.value = 0.1;
  osc3.connect(gain3);
  gain3.connect(musicGain);
  osc3.start();
  
  const lfo = audioContext.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.12;
  const lfoGain = audioContext.createGain();
  lfoGain.gain.value = 6;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);
  lfo.start();
}

function startMusic() {
  if (!audioContext) createAmbientMusic();
  if (audioContext && !isMusicPlaying) {
    if (audioContext.state === 'suspended') audioContext.resume();
    if (musicGain) musicGain.gain.setValueAtTime(0.3, audioContext.currentTime);
    isMusicPlaying = true;
    document.getElementById('musicToggle').innerHTML = '🔇';
    document.getElementById('musicStatus').innerHTML = 'Playing';
  }
}

function stopMusic() {
  if (audioContext && musicGain && isMusicPlaying) {
    musicGain.gain.setValueAtTime(0, audioContext.currentTime);
    isMusicPlaying = false;
    document.getElementById('musicToggle').innerHTML = '🔊';
    document.getElementById('musicStatus').innerHTML = 'Ambient Neural';
  }
}

function toggleMusic() {
  isMusicPlaying ? stopMusic() : startMusic();
}
document.getElementById('musicControl').addEventListener('click', toggleMusic);

function autoStartMusic() {
  startMusic();
  document.removeEventListener('click', autoStartMusic);
  document.removeEventListener('keydown', autoStartMusic);
}
document.addEventListener('click', autoStartMusic);
document.addEventListener('keydown', autoStartMusic);

// ========== CLOCK ==========
function updateClock() {
  const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
  document.getElementById('liveClock').innerText = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' IST';
}
updateClock();
setInterval(updateClock, 1000);

// ========== TICKER ==========
const tickerData = [
  { n: 'NIFTY 50', v: '25,842', ch: '+0.68%', u: 1 }, { n: 'SENSEX', v: '84,756', ch: '+0.73%', u: 1 },
  { n: 'BANK NIFTY', v: '53,980', ch: '+0.91%', u: 1 }, { n: 'GOLD', v: '₹74,520', ch: '-0.09%', u: 0 },
  { n: 'BTC', v: '$71,280', ch: '+3.2%', u: 1 }, { n: 'NASDAQ', v: '18,890', ch: '+1.02%', u: 1 }
];
const tickerContainer = document.getElementById('tickerItems');
let tickerHTML = '';
tickerData.forEach(d => {
  tickerHTML += `<span class="ticker-item"><span>${d.n}</span><span>${d.v}</span><span style="color:${d.u ? '#2F9B7A' : '#E67E22'}">${d.ch}</span></span>`;
});
tickerContainer.innerHTML = tickerHTML + tickerHTML;

// ========== FORM VALIDATION ==========
function checkUsername(v) {
  const el = document.getElementById('uStatus');
  v = v.trim();
  if (!v) { el.textContent = ''; return; }
  if (v.length < 3) { el.textContent = '✗ Too short'; el.className = 'status err'; return; }
  if (!/^[a-zA-Z0-9_-]+$/.test(v)) { el.textContent = '✗ Invalid characters'; el.className = 'status err'; return; }
  el.textContent = '✓ Available'; el.className = 'status ok';
}

function checkPassword(v) {
  const el = document.getElementById('pStatus');
  if (!v) { el.textContent = ''; return; }
  if (v.length < 6) { el.textContent = '✗ Too short (min 6)'; el.className = 'status err'; }
  else { el.textContent = '✓ Strong enough'; el.className = 'status ok'; }
}

// ========== BACKEND REGISTRATION (COMPLETELY UNTOUCHED) ==========
async function handleRegister() {
  const btn = document.getElementById('registerBtn');
  const errDiv = document.getElementById('errorAlert');
  const okDiv = document.getElementById('successAlert');
  const btnText = document.getElementById('btnText');
  errDiv.style.display = 'none';
  okDiv.style.display = 'none';
  
  const name = document.getElementById('name').value.trim();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  if (!username || !email || !password) {
    errDiv.textContent = 'Username, email and password are required.';
    errDiv.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btnText.innerHTML = 'Creating account... ⟳';
  
  try {
    const response = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password, name })
    });
    const data = await response.json();
    
    if (!response.ok) {
      errDiv.textContent = data.detail || 'Registration failed.';
      errDiv.style.display = 'block';
      return;
    }
    
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('username', data.username);
    
    okDiv.textContent = '✨ Account created! Redirecting to preferences...';
    okDiv.style.display = 'block';
    
    setTimeout(() => window.location.href = '/preferences/setup', 900);
  } catch (e) {
    errDiv.textContent = 'Network error. Please try again.';
    errDiv.style.display = 'block';
  } finally {
    btn.disabled = false;
    btnText.innerHTML = '✨ Create AI Account →';
  }
}

document.getElementById('registerBtn').onclick = handleRegister;
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });

// ========== 3D SPECTACULAR GLOBE ==========
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xFEF7E8);
scene.fog = new THREE.FogExp2(0xFEF7E8, 0.0007);

const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.2, 10.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Large Globe
const globeRadius = 3.5;
const canvasTex = document.createElement('canvas');
canvasTex.width = 2048;
canvasTex.height = 1024;
const ctxTex = canvasTex.getContext('2d');
ctxTex.fillStyle = '#FCF3E0';
ctxTex.fillRect(0, 0, canvasTex.width, canvasTex.height);
ctxTex.fillStyle = '#E5B83C';
ctxTex.globalAlpha = 0.28;
for (let i = 0; i < 2200; i++) {
  ctxTex.beginPath();
  ctxTex.arc(Math.random() * canvasTex.width, Math.random() * canvasTex.height, 1.5 + Math.random() * 4, 0, Math.PI*2);
  ctxTex.fill();
}
ctxTex.fillStyle = '#2F9B7A';
ctxTex.globalAlpha = 0.18;
for (let i = 0; i < 1200; i++) {
  ctxTex.fillRect(Math.random() * canvasTex.width, Math.random() * canvasTex.height, 2.5, 2.5);
}
const globeTexture = new THREE.CanvasTexture(canvasTex);

const globeGeometry = new THREE.SphereGeometry(globeRadius, 180, 180);
const globeMaterial = new THREE.MeshStandardMaterial({
  map: globeTexture,
  roughness: 0.2,
  metalness: 0.6,
  emissive: 0xE5B83C,
  emissiveIntensity: 0.08
});
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
scene.add(globe);

// Rings
const ring1 = new THREE.Mesh(new THREE.TorusGeometry(globeRadius + 0.25, 0.018, 180, 600), new THREE.MeshStandardMaterial({ color: 0xE5B83C, emissive: 0xE5B83C, emissiveIntensity: 0.45 }));
ring1.rotation.x = Math.PI / 2.2;
ring1.rotation.z = 0.55;
scene.add(ring1);

const ring2 = new THREE.Mesh(new THREE.TorusGeometry(globeRadius + 0.52, 0.013, 180, 600), new THREE.MeshStandardMaterial({ color: 0x2F9B7A, emissive: 0x1E6B55, emissiveIntensity: 0.35, transparent: true, opacity: 0.75 }));
ring2.rotation.x = Math.PI / 2.7;
ring2.rotation.z = -0.4;
scene.add(ring2);

// Particles
const partCount = 4200;
const partGeo = new THREE.BufferGeometry();
const partPositions = [];
for (let i = 0; i < partCount; i++) {
  const r = globeRadius + 0.4 + Math.random() * 1.3;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  partPositions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
}
partGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(partPositions), 3));
const partMat = new THREE.PointsMaterial({ color: 0xE5B83C, size: 0.021, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// Stars
const starsGeo = new THREE.BufferGeometry();
const starsPos = [];
for (let i = 0; i < 2800; i++) {
  starsPos.push((Math.random() - 0.5) * 550);
  starsPos.push((Math.random() - 0.5) * 300);
  starsPos.push((Math.random() - 0.5) * 130 - 65);
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3));
const starsMat = new THREE.PointsMaterial({ color: 0xE5B83C, size: 0.085, transparent: true, opacity: 0.38 });
const starsField = new THREE.Points(starsGeo, starsMat);
scene.add(starsField);

// Lighting
const ambient = new THREE.AmbientLight(0xE8DCC8);
scene.add(ambient);
const mainLight = new THREE.DirectionalLight(0xFFF5E6, 1.15);
mainLight.position.set(6, 7, 5);
scene.add(mainLight);
const backGold = new THREE.PointLight(0xE5B83C, 0.7);
backGold.position.set(0, 1.5, -7);
scene.add(backGold);

// Decorative markers
const markerGroup = [];
for (let i = 0; i < 50; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = globeRadius + 0.1;
  const x = r * Math.sin(phi) * Math.cos(theta);
  const y = r * Math.cos(phi);
  const z = r * Math.sin(phi) * Math.sin(theta);
  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.025, 16, 16), new THREE.MeshStandardMaterial({ color: 0xE5B83C, emissive: 0xE5B83C, emissiveIntensity: 0.4 }));
  marker.position.set(x, y, z);
  scene.add(marker);
  markerGroup.push(marker);
}

let targetRotY = 0;
let currentRotY = 0;
document.addEventListener('mousemove', (e) => {
  targetRotY = ((e.clientX / window.innerWidth) * 2 - 1) * 0.85;
});

let animTime = 0;
function animateScene() {
  animTime += 0.005;
  currentRotY += (targetRotY - currentRotY) * 0.07;
  globe.rotation.y = currentRotY;
  ring1.rotation.z += 0.0018;
  ring2.rotation.x += 0.0015;
  particles.rotation.y = currentRotY * 0.3;
  
  camera.position.x += (0 - camera.position.x) * 0.04;
  camera.position.y += (Math.sin(animTime * 0.6) * 0.006 - camera.position.y) * 0.02;
  camera.lookAt(0, 0.1, 0);
  
  renderer.render(scene, camera);
  requestAnimationFrame(animateScene);
}
animateScene();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
