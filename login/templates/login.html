<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – NewsDesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--card:#111118;--border:#1f1f2e;--accent:#f97316;--text:#f0eff0;--muted:#6b7280;--err:#ef4444;--ok:#22c55e}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;
background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,.08) 0,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(251,146,60,.05) 0,transparent 45%)}
.wrap{width:100%;max-width:400px}
.brand{text-align:center;margin-bottom:2rem}
.brand h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-.03em}
.brand h1 span{color:var(--accent)}
.brand p{color:var(--muted);font-size:.875rem;margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem}
.card h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:1.5rem}
.field{margin-bottom:1rem}
label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn{width:100%;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;border:none;border-radius:8px;padding:.8rem;cursor:pointer;margin-top:1.2rem;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.foot{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--muted)}
.foot a{color:var(--accent);text-decoration:none;font-weight:500}
.alert{padding:.7rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;display:none}
.alert.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><h1>News<span>Desk</span></h1><p>Your personalised financial news hub</p></div>
  <div class="card">
    <h2>Welcome back</h2>
    <div class="alert err" id="err"></div>
    <div class="alert ok"  id="ok"></div>
    <div class="field"><label>Username</label><input id="username" placeholder="your_username" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <div class="foot">No account? <a href="/auth/register">Register</a></div>
  </div>
</div>
<script>
async function doLogin(){
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const ok=document.getElementById('ok');
  err.style.display='none'; ok.style.display='none';
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  if(!username||!password){err.textContent='Please fill in all fields.';err.style.display='block';return}
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.detail||'Login failed.';err.style.display='block';return}
    localStorage.setItem('access_token',d.access_token);
    localStorage.setItem('username',d.username);
    ok.textContent='Login successful! Redirecting…';ok.style.display='block';
    setTimeout(()=>window.location.href=d.is_admin?'/admin/stats':(d.preferences_set?'/dashboard/':'/preferences/setup'),800);
  }catch(e){err.textContent='Network error.';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Sign In'}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
