<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Read Article – NewsDesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surface:#111118;--surface2:#18181f;--border:#1f1f2e;--border2:#2a2a3a;
  --accent:#f97316;--accent2:#fb923c;--accentlow:rgba(249,115,22,.12);
  --text:#f0eff0;--text2:#a1a1b5;--text3:#4a4a62;
  --liked:#22c55e;--likedlow:rgba(34,197,94,.1);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0}

/* Topbar */
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);
display:flex;align-items:center;padding:0 1.25rem;gap:.75rem}
.brand{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.brand span{color:var(--accent)}
.back-btn{display:flex;align-items:center;gap:.3rem;color:var(--text2);font-size:.85rem;
cursor:pointer;background:none;border:1px solid var(--border);border-radius:7px;padding:.35rem .7rem;
transition:all .15s;text-decoration:none}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Container */
.container{max-width:800px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* Article header */
.art-cat{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
color:var(--accent);margin-bottom:.5rem}
.art-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;line-height:1.35;
margin-bottom:.75rem}
.art-meta{font-size:.8rem;color:var(--text3);margin-bottom:1rem;display:flex;gap:.7rem;flex-wrap:wrap}
.art-img{width:100%;max-height:400px;object-fit:cover;border-radius:10px;margin-bottom:1.25rem;
border:1px solid var(--border)}
.art-desc{font-size:.92rem;line-height:1.75;color:var(--text2);margin-bottom:1.5rem;white-space:pre-wrap}

/* Action buttons */
.actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.5rem}
.action-btn{display:flex;align-items:center;gap:.4rem;padding:.55rem 1rem;
border:1px solid var(--border);border-radius:8px;background:var(--surface);
color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:500;
cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.action-btn.active{border-color:var(--liked);color:var(--liked);background:var(--likedlow)}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.action-btn .icon{font-size:1rem}

/* Summary box */
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;
padding:1.25rem;margin-bottom:1.5rem;display:none}
.summary-box.show{display:block}
.summary-label{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
color:var(--accent);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.summary-text{font-size:.88rem;line-height:1.7;color:var(--text2);white-space:pre-wrap}

/* Original link */
.original-link{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;
background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;
font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;transition:background .2s}
.original-link:hover{background:var(--accent2)}

/* Toast */
.toast{position:fixed;bottom:1.25rem;right:1.25rem;background:var(--surface2);border:1px solid var(--border2);
border-radius:9px;padding:.65rem .9rem;font-size:.82rem;color:var(--text);z-index:999;
transform:translateY(6px);opacity:0;transition:all .25s;max-width:280px;box-shadow:0 8px 20px rgba(0,0,0,.4)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(34,197,94,.4)}.toast.err{border-color:rgba(239,68,68,.4)}

/* Loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* Loading state */
.loading-msg{text-align:center;color:var(--text3);padding:3rem 1rem;font-size:.9rem}

/* Related articles */
.related-section{margin-top:2.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.related-title{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:1rem;
display:flex;align-items:center;gap:.5rem}
.related-title .line{flex:1;height:1px;background:var(--border)}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.rel-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.rel-card-img{width:100%;height:100px;object-fit:cover;background:var(--surface2)}
.rel-card-noimg{width:100%;height:100px;background:var(--surface2);display:flex;
align-items:center;justify-content:center;font-size:1.3rem;color:var(--text3)}
.rel-card-body{padding:.65rem}
.rel-card-time{font-size:.65rem;color:var(--text3);margin-bottom:.3rem}
.rel-card-title{font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;
line-height:1.35;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;
-webkit-box-orient:vertical;overflow:hidden}
.rel-card-desc{font-size:.72rem;color:var(--text2);margin-top:.3rem;
display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Footer */
.page-footer{max-width:800px;margin:0 auto;padding:1.5rem 1.25rem 2.5rem;
border-top:1px solid var(--border);margin-top:2rem}
.footer-links{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-bottom:.75rem}
.footer-link{display:flex;align-items:center;gap:.3rem;padding:.4rem .8rem;
border:1px solid var(--border);border-radius:7px;background:var(--surface);
color:var(--text2);font-size:.8rem;text-decoration:none;transition:all .15s}
.footer-link:hover{border-color:var(--accent);color:var(--accent)}
.footer-link:hover{border-color:var(--accent);color:var(--accent)}
.footer-copy{text-align:center;font-size:.7rem;color:var(--text3)}

/* Chat Panel */
.chat-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:900;display:none;opacity:0;transition:opacity .3s}
.chat-panel{position:fixed;top:0;right:-400px;width:400px;max-width:100%;height:100vh;background:var(--surface);
border-left:1px solid var(--border);z-index:901;display:flex;flex-direction:column;transition:right .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s}
body.chat-open .chat-overlay{display:block;opacity:1}
body.chat-open .chat-panel{right:0;box-shadow:-5px 0 25px rgba(0,0,0,.5)}
.chat-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);background:var(--surface2)}
.chat-close{cursor:pointer;color:var(--text2);transition:color .2s;padding:.2rem}
.chat-close:hover{color:var(--accent)}
.chat-messages{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:1rem}
.msg{max-width:85%;padding:.7rem 1rem;border-radius:12px;font-size:.92rem;line-height:1.6;white-space:pre-wrap}
.msg-ai{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:2px}
.msg-user{align-self:flex-end;background:var(--accentlow);border:1px solid rgba(249,115,22,.2);color:var(--accent);border-bottom-right-radius:2px}
.msg-loading{align-self:flex-start;background:none;color:var(--text3);font-size:.85rem;display:flex;gap:.4rem;align-items:center}
.chat-input-area{padding:1rem;border-top:1px solid var(--border);background:var(--surface2);display:flex;gap:.5rem}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem;color:var(--text);
font-family:inherit;font-size:.9rem;resize:none;outline:none}
.chat-input:focus{border-color:var(--accent)}
.chat-send{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 1.2rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background .2s}
.chat-send:hover{background:var(--accent2)}
.chat-send:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <a href="/dashboard/" class="brand">News<span>Desk</span></a>
  <a href="/dashboard/" class="back-btn">← Back to Dashboard</a>
</div>

<!-- Main content -->
<div class="container">
  <div id="loading" class="loading-msg">Loading article…</div>

  <div id="articleContent" style="display:none">
    <div class="art-cat" id="artCat"></div>
    <div class="art-title" id="artTitle"></div>
    <div class="art-meta">
      <span id="artAuthor"></span>
      <span id="artTime"></span>
      <span id="artSource"></span>
    </div>
    <img class="art-img" id="artImg" src="" alt="" style="display:none"/>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn" id="btnChat" onclick="openChat()">
        <span class="icon">💬</span> Chat with AI
      </button>
      <button class="action-btn" id="btnSummarise" onclick="doSummarise()">
        <span class="icon">📝</span> Summarise
      </button>
      <button class="action-btn" id="btnSave" onclick="doSave()">
        <span class="icon">🔖</span> <span id="saveLabel">Save</span>
      </button>
      <button class="action-btn" id="btnTrack" onclick="doTrack()">
        <span class="icon">📌</span> <span id="trackLabel">Track</span>
      </button>
    </div>

    <!-- Summary section -->
    <div class="summary-box" id="summaryBox">
      <div class="summary-label">🤖 AI Summary</div>
      <div class="summary-text" id="summaryText"></div>
    </div>

    <!-- Article content -->
    <div class="art-desc" id="artLongDesc"></div>
    <div class="art-desc" id="artShortDesc"></div>

    <!-- Link to original -->
    <a class="original-link" id="artLink" href="#" target="_blank" rel="noopener">
      Read on Official Website →
    </a>

    <!-- Related articles -->
    <div class="related-section" id="relatedSection" style="display:none">
      <div class="related-title">
        📰 Related Articles
        <span class="line"></span>
      </div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

    <!-- More from other topics -->
    <div class="related-section" id="moreSection" style="display:none">
      <div class="related-title">
        ✨ More News
        <span class="line"></span>
      </div>
      <div class="related-grid" id="moreGrid"></div>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-overlay" id="chatOverlay" onclick="closeChat()"></div>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <div>💬 Chat with AI</div>
    <div class="chat-close" onclick="closeChat()">✕</div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <!-- Messages appended here -->
  </div>
  <div class="chat-input-area">
    <textarea id="chatInput" class="chat-input" placeholder="Ask a question about this article..." rows="2" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendChat();}"></textarea>
    <button class="chat-send" id="chatSendBtn" onclick="sendChat()">Send</button>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">
  <div class="footer-links">
    <a href="/dashboard/" class="footer-link">🏠 Home</a>
    <a href="/preferences/setup" class="footer-link">⚙️ Preferences</a>
    <a href="/dashboard/" class="footer-link" onclick="sessionStorage.setItem('go_bookmarks','1')">🔖 Bookmarks</a>
    <a href="/auth/logout" class="footer-link" onclick="event.preventDefault();doLogout()">⏻ Logout</a>
  </div>
  <div class="footer-copy">NewsDesk · Your personalised news feed</div>
</div>

<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('access_token');
if(!token) window.location.href = '/auth/login';

let article = null;

// ── Load article from URL params ─────────────────────────────────────────────
async function loadArticle(){
  const params = new URLSearchParams(window.location.search);
  const newsId = params.get('news_id');

  // Try to get article from sessionStorage (passed from dashboard)
  const stored = sessionStorage.getItem('article_data');
  if(stored){
    try{
      article = JSON.parse(stored);
      sessionStorage.removeItem('article_data');
      renderArticle();
      return;
    } catch(e){}
  }

  // Fallback: show error
  if(!newsId){
    document.getElementById('loading').textContent = 'No article specified.';
    return;
  }

  document.getElementById('loading').textContent = 'Article data not found. Please go back and try again.';
}

function renderArticle(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('articleContent').style.display = 'block';

  document.getElementById('artCat').textContent = article.category || '';
  document.getElementById('artTitle').textContent = article.title || 'Untitled';
  document.getElementById('artAuthor').textContent = article.author || '';
  document.getElementById('artTime').textContent = article.published_time || '';
  document.getElementById('artSource').textContent = article.source ? `· ${article.source}` : '';

  if(article.thumbnail){
    const img = document.getElementById('artImg');
    img.src = article.thumbnail;
    img.style.display = 'block';
    img.onerror = () => img.style.display = 'none';
  }

  document.getElementById('artLongDesc').textContent = article.long_desc || '';
  document.getElementById('artShortDesc').textContent = (!article.long_desc && article.short_desc) ? article.short_desc : '';
  document.getElementById('artLink').href = article.url || '#';

  // Check if already bookmarked
  checkBookmarkStatus();

  // Load related articles
  loadRelated();
}

// ── Summarise ────────────────────────────────────────────────────────────────
let sumController = null;

async function doSummarise(){
  const btn = document.getElementById('btnSummarise');
  
  if(sumController){
    sumController.abort();
    sumController = null;
    return;
  }

  const box = document.getElementById('summaryBox');
  const txt = document.getElementById('summaryText');

  btn.innerHTML = '<span class="spinner" style="border-top-color:var(--danger)"></span> <span style="color:var(--danger)">Stop Generating</span>';
  
  sumController = new AbortController();
  box.classList.add('show');
  txt.textContent = ''; 

  try{
    const r = await fetch('/article/summarise', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({
        news_id: article.news_id || '',
        title: article.title || '',
        long_desc: article.long_desc || article.short_desc || '',
        url: article.url || '',
      }),
      signal: sumController.signal
    });
    
    if(!r.ok){ showToast('Summarisation failed', 'err'); throw new Error(); }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      txt.textContent += decoder.decode(value, {stream: true});
    }
    showToast('Summary generated!', 'ok');
  } catch(e){
    if(e.name === 'AbortError') showToast('Stream stopped', 'ok');
    else showToast('Network error', 'err');
  } finally {
    sumController = null;
    btn.innerHTML = '<span class="icon">📝</span> Summarise';
  }
}

// ── Chat AI ──────────────────────────────────────────────────────────────────
let chatHistory = [];

function openChat(){
  document.body.classList.add('chat-open');
  if(chatHistory.length === 0){
    pushMessage('ai', "Hi! I'm your AI news assistant. What would you like to know about this article?");
  }
}
function closeChat(){
  document.body.classList.remove('chat-open');
}

function pushMessage(role, text){
  if(role !== 'loading'){
    chatHistory.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
  }
  renderChat();
}

function renderChat(){
  const box = document.getElementById('chatMessages');
  box.innerHTML = '';
  chatHistory.forEach(m => {
    const isUser = m.role === 'user';
    box.innerHTML += `<div class="msg ${isUser ? 'msg-user' : 'msg-ai'}">${esc(m.content)}</div>`;
  });
  box.scrollTop = box.scrollHeight;
}

let chatController = null;

async function sendChat(){
  const sendBtn = document.getElementById('chatSendBtn');
  if(chatController){
    chatController.abort();
    chatController = null;
    return;
  }

  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  pushMessage('user', text);

  const box = document.getElementById('chatMessages');
  const msgId = 'msg-' + Date.now();
  box.innerHTML += `<div class="msg msg-ai" id="${msgId}"><span class="spinner" style="border-top-color:var(--accent)"></span> Thinking...</div>`;
  box.scrollTop = box.scrollHeight;
  
  sendBtn.textContent = 'Stop';
  sendBtn.style.background = 'var(--danger)';
  
  chatController = new AbortController();
  let fullReply = '';

  try {
    const articleText = (article.title || '') + '\n\n' + (article.long_desc || article.short_desc || '');
    const r = await fetch('/article/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({ context_text: articleText, messages: chatHistory }),
      signal: chatController.signal
    });
    
    if(!r.ok) throw new Error('-');

    document.getElementById(msgId).innerHTML = ''; // clear spinner
    const msgEl = document.getElementById(msgId);
    
    const reader = r.body.getReader();
    const decoder = new TextDecoder();

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = decoder.decode(value, {stream: true});
      fullReply += chunk;
      msgEl.textContent += chunk; 
      box.scrollTop = box.scrollHeight;
    }
    chatHistory.push({role: 'assistant', content: fullReply});
  } catch(e) {
    if(e.name === 'AbortError'){
      if(fullReply) chatHistory.push({role: 'assistant', content: fullReply + ' [Stopped]'});
    } else {
      showToast('Chat failed.', 'err');
      chatHistory.pop(); // Remove the user message since it failed completely
    }
  } finally {
    renderChat(); // Re-render to safely escape all accumulated HTML
    chatController = null;
    sendBtn.textContent = 'Send';
    sendBtn.style.background = 'var(--accent)';
    setTimeout(() => input.focus(), 100);
  }
}

// ── Save (Bookmark) ──────────────────────────────────────────────────────────
async function doSave(){
  const btn = document.getElementById('btnSave');
  const label = document.getElementById('saveLabel');

  try{
    const nid = article.news_id || '';
    const r = await fetch(`/dashboard/bookmark/${encodeURIComponent(nid)}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`}
    });
    const d = await r.json();
    if(!r.ok){ showToast(d.detail || 'Save failed', 'err'); return; }

    if(d.bookmarked){
      btn.classList.add('active');
      label.textContent = 'Saved';
      showToast('Article saved!', 'ok');
    } else {
      btn.classList.remove('active');
      label.textContent = 'Save';
      showToast('Removed from saved', 'ok');
    }
  } catch(e){ showToast('Network error', 'err'); }
}

async function checkBookmarkStatus(){
  try{
    const r = await fetch('/auth/me', {
      headers: {'Authorization': `Bearer ${token}`}
    });
    const d = await r.json();
    if(d.bookmarks && d.bookmarks.includes(article.news_id)){
      document.getElementById('btnSave').classList.add('active');
      document.getElementById('saveLabel').textContent = 'Saved';
    }
  } catch(e){}
}

// ── Track ────────────────────────────────────────────────────────────────────
async function doTrack(){
  const btn = document.getElementById('btnTrack');
  const label = document.getElementById('trackLabel');

  btn.disabled = true;
  try{
    const r = await fetch('/article/track', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({
        news_id: article.news_id || '',
        title: article.title || '',
      })
    });
    const d = await r.json();
    if(!r.ok){ showToast(d.detail || 'Track failed', 'err'); return; }

    btn.classList.add('active');
    label.textContent = 'Tracked';
    showToast(d.message, 'ok');
  } catch(e){ showToast('Network error', 'err'); }
  finally{ btn.disabled = false; }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
let toastT = null;
function showToast(msg, type='ok'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(s){
  if(typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(s){
  if(!s) return '';
  try{
    const d = new Date(s), now = new Date(), diff = (now - d) / 1000;
    if(diff < 60) return 'just now';
    if(diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if(diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleDateString('en-IN', {day:'numeric', month:'short'});
  } catch{ return ''; }
}

// ── Related Articles ───────────────────────────────────────────────────────
let relatedArticles = [];

async function loadRelated(){
  const catKey = article._cat || article._category_key || guessCategoryKey(article.category);
  const seenIds = new Set([article.news_id]);

  // 1. Load same-category articles
  let sameCatArts = [];
  if(catKey){
    try{
      const r = await fetch(`/dashboard/feed/category/${catKey}?limit=20`, {
        headers: {'Authorization': `Bearer ${token}`}
      });
      if(r.ok){
        const d = await r.json();
        sameCatArts = (d.articles || []).filter(a => !seenIds.has(a.news_id));
        sameCatArts.forEach(a => seenIds.add(a.news_id));
      }
    } catch(e){}
  }

  // Show related section
  if(sameCatArts.length){
    relatedArticles = sameCatArts;
    renderRelated(sameCatArts.slice(0, 8));
  }

  // 2. Load personalized feed (other topics) to fill 'More News'
  try{
    const r2 = await fetch('/dashboard/feed?limit=60', {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if(r2.ok){
      const d2 = await r2.json();
      let moreArts = (d2.for_you || []).filter(a => !seenIds.has(a.news_id));
      if(moreArts.length){
        renderMore(moreArts.slice(0, 8));
      }
    }
  } catch(e){}
}

function guessCategoryKey(categoryName){
  if(!categoryName) return null;
  // Try to match category name to key from ALL_CATEGORIES
  const ALL_CATS = {{ all_categories | tojson }};
  for(const [key, name] of Object.entries(ALL_CATS)){
    if(name.toLowerCase() === categoryName.toLowerCase()) return key;
  }
  // Try lowercase with underscores
  return categoryName.toLowerCase().replace(/[^a-z0-9]+/g, '_');
}

function renderRelated(arts){
  const section = document.getElementById('relatedSection');
  const grid = document.getElementById('relatedGrid');

  let html = '';
  arts.forEach((a, idx) => {
    const time = fmtTime(a.published_time);
    html += `
    <div class="rel-card" data-relidx="${idx}">
      ${a.thumbnail
        ? `<img class="rel-card-img" src="${esc(a.thumbnail)}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="rel-card-noimg">📰</div>`}
      <div class="rel-card-body">
        <div class="rel-card-time">${time}</div>
        <div class="rel-card-title">${esc(a.title || 'Untitled')}</div>
        <div class="rel-card-desc">${esc(a.short_desc || '')}</div>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
  section.style.display = 'block';

  // Click handlers
  grid.querySelectorAll('.rel-card[data-relidx]').forEach(card => {
    card.addEventListener('click', () => {
      const i = parseInt(card.dataset.relidx);
      const a = relatedArticles[i];
      sessionStorage.setItem('article_data', JSON.stringify(a));
      window.location.href = `/article/read?news_id=${encodeURIComponent(a.news_id || '')}`;
    });
  });
}
