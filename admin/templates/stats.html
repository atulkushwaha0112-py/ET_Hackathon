<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NewsDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Include Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--surface-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            letter-spacing: -0.025em;
        }

        .sidebar-brand span { color: var(--primary); }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.875rem 1rem;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
        }

        .nav-link svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .logout-btn {
            margin-top: auto;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 0.5rem;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .profile-badge {
            background: var(--surface);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--surface-border);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-badge div.dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            padding: 1.75rem;
            border-radius: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            opacity: 0.3;
            transform: translate(30%, -30%);
            border-radius: 50%;
            pointer-events: none;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Charts & Tables */
        .dashboard-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .dashboard-row { grid-template-columns: 1fr; }
        }

        .widget {
            background: var(--surface);
            border: 1px solid var(--surface-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
        }

        .widget-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .list-group {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar for list */
        .list-group::-webkit-scrollbar { width: 6px; }
        .list-group::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 4px; }
        .list-group::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 4px; }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--surface-border);
        }

        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item:hover {
            background: var(--surface-hover);
            border-radius: 0.5rem;
        }

        .cat-name {
            font-weight: 500;
            color: var(--text-main);
        }

        .cat-count {
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .loading-shimmer {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">NewsDesk <span>Admin</span></div>
        <nav>
            <a href="#" class="nav-link active">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                Overview
            </a>
            <!-- Placeholder for future nav items -->
        </nav>
        
        <button class="logout-btn" onclick="logout()">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
        </button>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1>Platform Statistics</h1>
            <div class="profile-badge">
                <div class="dot"></div>
                System Active
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">
                    <span>Total Users</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <div class="stat-value" id="totalUsers">-</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">
                    <span>Overall Posts Indexed</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div class="stat-value" id="totalPosts">-</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">
                    <span>Active Tracked Topics</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <div class="stat-value" id="totalTracked">-</div>
            </div>
        </div>

        <div class="dashboard-row">
            <div class="widget">
                <h2 class="widget-title">Posts Distribution by Category</h2>
                <div style="position: relative; height:300px; width:100%">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="widget">
                <h2 class="widget-title">Category Leaderboard</h2>
                <div class="list-group" id="categoryList">
                    <p class="text-muted loading-shimmer" style="padding: 1rem;">Loading categories...</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        async function fetchStats() {
            try {
                const res = await fetch('/admin/api/stats_data');
                if(!res.ok) {
                    if(res.status === 401) window.location.href = '/admin/login';
                    throw new Error('Failed to fetch stats');
                }
                const data = await res.json();
                
                // Update UI counters
                document.getElementById('totalUsers').textContent = data.total_users;
                document.getElementById('totalPosts').textContent = data.total_posts.toLocaleString();
                document.getElementById('totalTracked').textContent = data.total_tracked_topics;

                const cats = data.posts_per_category;
                const labels = Object.keys(cats);
                const values = Object.values(cats);

                // Render List
                const listEl = document.getElementById('categoryList');
                listEl.innerHTML = '';
                labels.forEach((cat, i) => {
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerHTML = `
                        <div style="display:flex; align-items:center; gap: 12px;">
                            <span style="color:var(--text-muted); font-size: 0.875rem;">#${i+1}</span>
                            <span class="cat-name">${cat}</span>
                        </div>
                        <span class="cat-count">${values[i].toLocaleString()}</span>
                    `;
                    listEl.appendChild(item);
                });

                // Render Chart
                const ctx = document.getElementById('categoryChart').getContext('2d');
                
                // Only take top 8 for chart to avoid crowding
                const topLabels = labels.slice(0, 8);
                const topValues = values.slice(0, 8);
                
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: topLabels,
                        datasets: [{
                            data: topValues,
                            backgroundColor: [
                                '#3b82f6', '#8b5cf6', '#ec4899', '#f43f5e', 
                                '#f59e0b', '#10b981', '#14b8a6', '#6366f1'
                            ],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'right',
                                labels: { color: '#f8fafc', font: { family: 'Inter' } }
                            }
                        },
                        cutout: '70%'
                    }
                });

            } catch(e) {
                console.error(e);
            }
        }

        async function logout() {
            if(confirm("Are you sure you want to log out?")) {
                await fetch('/admin/logout', { method: 'POST' });
                window.location.href = '/admin/login';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchStats);
    </script>
</body>
</html>
